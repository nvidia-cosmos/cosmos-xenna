on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to test release for'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract changelog section for tag
        id: extract
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          TAG=${TAG#v}  # Strip leading 'v' if present
          echo "Looking for changelog section for tag: $TAG"

          # Extract relevant section
          CHANGELOG=$(awk -v tag="$TAG" '
            $0 ~ "## \\[" tag "\\]" {flag=1; next}
            flag && /^## \[/ {flag=0}
            flag && /^### Released/ {next}
            flag && /^- [0-9]{4}-[0-9]{2}-[0-9]{2}/ {next}
            flag {print}
          ' CHANGELOG.md)

          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="No changelog entry found for $TAG"
          fi

          # Write to a temp file
          echo "$CHANGELOG" > release_notes.md

          # Save multiline output to GITHUB_ENV via file
          echo "RELEASE_BODY<<EOF" >> $GITHUB_ENV
          cat release_notes.md >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: Release ${{ github.event.inputs.tag || github.ref_name }}
          body_path: release_notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  wheels:
    name: ${{ matrix.conf.os }}-${{ matrix.python-version }}-${{ matrix.conf.target-triple }}-${{ matrix.conf.target }}
    runs-on: ${{ matrix.conf.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
        conf:
          - { os: ubuntu-latest, target: x86_64,  target-triple: x86_64-unknown-linux-gnu,  manylinux: auto }
          - { os: ubuntu-latest, target: aarch64, target-triple: aarch64-unknown-linux-gnu, manylinux: auto }

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      # Docs: https://github.com/PyO3/maturin-action
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.conf.target }}
          manylinux: ${{ matrix.conf.manylinux }}
          args: -i ${{ matrix.python-version }} --release --out dist

      - name: Show wheels
        run: ls -lh dist

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        if: ${{ ( startsWith(github.ref, 'refs/heads/master') || startsWith(github.ref, 'refs/tags/') ) }}
        with:
          name: ${{ matrix.conf.os }}-${{ matrix.python-version }}-${{ matrix.conf.target-triple }}-${{ matrix.conf.target }}
          path: dist
