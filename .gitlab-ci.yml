workflow:
  rules:
    # This is needed for merge trains
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    # This is needed to run in MRs
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

stages:
  - ci

# Use pytest to run unit-tests
ci:unit-tests:
  stage: ci
  image:
    name: nvcr.io/nvidian/xenna_build:0.0.1
  script:
    - uv sync
    - uv run maturin develop --release
    - uv run run_presubmit.py test
  tags:
    - cpu

# Run linters, autoformat checks, type checks.
ci:lint:
  stage: ci
  image:
    name: nvcr.io/nvidian/xenna_build:0.0.1
  script:
    - uv sync
    - uv run maturin develop --release
    - uv run run_presubmit.py lint
  tags:
    - cpu

